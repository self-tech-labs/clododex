name: Fresh Intel PR

on:
  workflow_dispatch:
  schedule:
    - cron: "23 6,18 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: fresh-intel-pr
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh X intel snapshot
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      REFRESH_BRANCH: automation/fresh-intel
      BASE_BRANCH: main

    steps:
      - name: Check required secrets
        run: |
          missing=0
          if [ -z "$X_BEARER_TOKEN" ]; then
            echo "::error::Missing repository secret X_BEARER_TOKEN"
            missing=1
          fi
          if [ -z "$XAI_API_KEY" ]; then
            echo "::error::Missing repository secret XAI_API_KEY"
            missing=1
          fi
          exit "$missing"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_BRANCH }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create refresh branch
        run: git checkout -B "$REFRESH_BRANCH"

      - name: Fetch X data and rebuild snapshots
        run: npm run intel:build

      - name: Validate generated arena data
        run: npm run arena:validate

      - name: Run tests
        run: npm run test

      - name: Commit generated intel changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/intel/current-snapshot.json data/intel/daily data/arena/snapshots/current.json

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated intel changes to publish."
            exit 0
          fi

          git commit -m "Refresh X intel snapshot"
          git push --force-with-lease origin "HEAD:$REFRESH_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update pull request
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$REFRESH_BRANCH" \
            --base "$BASE_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          body_file="$(mktemp)"
          cat > "$body_file" <<'BODY'
          ## Summary
          - refreshes Agent Arena intel from X
          - runs xAI enrichment
          - rebuilds the dashboard and arena snapshots

          ## Validation
          - npm run intel:build
          - npm run arena:validate
          - npm run test

          ## Review notes
          Please review the generated claims, source links, and archived low-confidence items before merging.
          BODY

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Refresh Agent Arena intel" \
              --body-file "$body_file"
            gh pr comment "$pr_number" \
              --repo "$GITHUB_REPOSITORY" \
              --body "Fresh intel snapshot updated by scheduled automation for run $GITHUB_RUN_ID."
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "$BASE_BRANCH" \
              --head "$REFRESH_BRANCH" \
              --title "Refresh Agent Arena intel" \
              --body-file "$body_file"
          fi

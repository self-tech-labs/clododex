name: Fresh Clododex Intel Publish

on:
  workflow_dispatch:
  schedule:
    - cron: "23 6,18 * * *"

permissions:
  contents: write

concurrency:
  group: fresh-intel-publish
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh X intel snapshot
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      BASE_BRANCH: main

    steps:
      - name: Check required secrets
        run: |
          missing=0
          if [ -z "$X_BEARER_TOKEN" ]; then
            echo "::error::Missing repository secret X_BEARER_TOKEN"
            missing=1
          fi
          if [ -z "$XAI_API_KEY" ]; then
            echo "::error::Missing repository secret XAI_API_KEY"
            missing=1
          fi
          exit "$missing"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_BRANCH }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch X data and rebuild snapshots
        run: npm run intel:build

      - name: Assert fresh X intel
        run: npm run intel:assert-fresh

      - name: Validate generated arena data
        run: npm run arena:validate

      - name: Run tests
        run: npm run test

      - name: Publish generated intel changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/intel/current-snapshot.json data/intel/daily data/arena/snapshots/current.json

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated intel changes to publish."
            exit 0
          fi

          git commit -m "Refresh X intel snapshot"
          git pull --rebase origin "$BASE_BRANCH"
          git push origin "HEAD:$BASE_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"
